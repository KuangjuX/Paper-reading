<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 480" font-family="Helvetica, Arial, sans-serif" font-size="11">
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
  <style>
    .title{font-size:15px;font-weight:600;}
    .sub{font-size:10px;fill:#666;}
    .box{stroke:#333;stroke-width:1.2;}
    .gate{fill:#fde8c8;}
    .up{fill:#fff2a8;}
    .swi{fill:#d9efd0;}
    .l2blk{fill:#dde7ff;}
    .mask0{fill:#eee;}
    .mask1{fill:#9ad19a;}
    .lab{font-weight:600;font-size:11px;}
    .arr{stroke:#444;fill:none;}
  </style>

  <text x="20" y="26" class="title">&#x56FE; 4  L1&#x2192;L2 &#x7EC6;&#x7C92;&#x5EA6;&#x4F9D;&#x8D56;&#xFF1A;L2 &#x6BCF;&#x4E2A; K &#x5757;&#x7B49; L1 &#x4E24;&#x4E2A; N &#x5757;</text>
  <text x="20" y="44" class="sub">L1 &#x8F93;&#x51FA;&#x5BBD; = 2&#x00B7;I&#xFF08;gate||up&#xFF09;&#xFF0C;SwiGLU &#x540E;&#x51CF;&#x534A;&#xFF0C;&#x6240;&#x4EE5;&#x4E00;&#x4E2A; L2 &#x8F93;&#x5165;&#x5206;&#x5757;&#x5BF9;&#x5E94; L1 &#x7684;&#x4E24;&#x4E2A;&#x8F93;&#x51FA;&#x5206;&#x5757;</text>

  <!-- L1 output tiles -->
  <text x="30" y="80" class="lab">L1 &#x8F93;&#x51FA;&#xFF08;N &#x5757;&#xFF09;</text>
  <rect class="box gate" x="30" y="90" width="100" height="48"/>
  <text x="80" y="112" text-anchor="middle" font-size="10">N=0 (gate0)</text>
  <rect class="box up" x="135" y="90" width="100" height="48"/>
  <text x="185" y="112" text-anchor="middle" font-size="10">N=1 (up0)</text>
  <rect class="box gate" x="240" y="90" width="100" height="48"/>
  <text x="290" y="112" text-anchor="middle" font-size="10">N=2 (gate1)</text>
  <rect class="box up" x="345" y="90" width="100" height="48"/>
  <text x="395" y="112" text-anchor="middle" font-size="10">N=3 (up1)</text>

  <!-- SwiGLU -->
  <rect class="box swi" x="30" y="155" width="415" height="38"/>
  <text x="237" y="179" text-anchor="middle" font-size="11">SwiGLU + &#x8DEF;&#x7531;&#x6743;&#x91CD; + FP8 &#x91CF;&#x5316;</text>

  <!-- L2 input blocks -->
  <text x="30" y="218" class="lab">L2 &#x8F93;&#x5165;&#xFF08;&#x5BBD; I = L1 / 2&#xFF09;</text>
  <rect class="box swi" x="30" y="228" width="200" height="38"/>
  <text x="130" y="252" text-anchor="middle" font-size="10">H0 = SwiGLU(gate0, up0)</text>
  <rect class="box swi" x="235" y="228" width="200" height="38"/>
  <text x="335" y="252" text-anchor="middle" font-size="10">H1 = SwiGLU(gate1, up1)</text>

  <!-- L2 K blocks -->
  <text x="30" y="295" class="lab">L2 &#x7684; K &#x5206;&#x5757;&#xFF08;&#x6D88;&#x8D39;&#x65B9;&#xFF09;</text>
  <rect class="box l2blk" x="30" y="305" width="200" height="38"/>
  <text x="130" y="329" text-anchor="middle" font-size="10">K-block 0 &#x7B49; H0 &#x5230;&#x4F4D;</text>
  <rect class="box l2blk" x="235" y="305" width="200" height="38"/>
  <text x="335" y="329" text-anchor="middle" font-size="10">K-block 1 &#x7B49; H1 &#x5230;&#x4F4D;</text>

  <!-- Arrows SwiGLU -> L2 -->
  <path d="M130 266 L130 305" class="arr" marker-end="url(#ar3)"/>
  <path d="M335 266 L335 305" class="arr" marker-end="url(#ar3)"/>

  <!-- ===== Right panel: arrival mask ===== -->
  <text x="510" y="80" class="lab">l2_arrival_mask&#xFF08;64 &#x4F4D;&#xFF09;</text>
  <g font-family="monospace" font-size="12">
    <rect class="box mask0" x="510" y="90" width="36" height="32"/>
    <text x="528" y="111" text-anchor="middle">&#x2026;0</text>
    <rect class="box mask0" x="550" y="90" width="36" height="32"/>
    <text x="568" y="111" text-anchor="middle">0</text>
    <rect class="box mask1" x="590" y="90" width="36" height="32"/>
    <text x="608" y="111" text-anchor="middle">1</text>
    <rect class="box mask1" x="630" y="90" width="36" height="32"/>
    <text x="648" y="111" text-anchor="middle">1</text>
    <rect class="box mask1" x="670" y="90" width="36" height="32"/>
    <text x="688" y="111" text-anchor="middle">1</text>
    <rect class="box mask1" x="710" y="90" width="36" height="32"/>
    <text x="728" y="111" text-anchor="middle">1</text>
  </g>
  <text x="510" y="142" class="sub">L1 &#x5B8C;&#x6210;&#x4E00;&#x4E2A; N &#x5757; &#x2192; &#x5BF9;&#x5E94; bit &#x7F6E; 1</text>
  <text x="510" y="157" class="sub">L2 &#x7B49;&#x5F85; (3 &lt;&lt; k*2) &#x5373;&#x201C;&#x76F8;&#x90BB;&#x4E24;&#x4F4D;&#x201D;&#x90FD;&#x4E3A; 1</text>

  <!-- Explanation box (wider: 500px) -->
  <rect x="510" y="175" width="520" height="200" fill="#fafafa" stroke="#bbb" rx="4"/>
  <text x="525" y="197" font-weight="600" font-size="11">&#x4E3A;&#x4EC0;&#x4E48;&#x662F;&#x201C;&#x76F8;&#x90BB;&#x4E24;&#x4F4D;&#x201D;&#xFF1F;</text>
  <text x="525" y="218" class="sub">L1 N &#x7EF4;&#x771F;&#x5B9E;&#x957F;&#x5EA6; = 2&#x00B7;I&#xFF08;gate &#x548C; up &#x62FC;&#x63A5;&#xFF09;</text>
  <text x="525" y="236" class="sub">&#x4EE3;&#x7801;&#x7EA6;&#x675F; BLOCK_K == BLOCK_N</text>
  <text x="525" y="254" class="sub">&#x2234; L2 &#x4E00;&#x4E2A; K-block = L1 &#x4E24;&#x4E2A; N-block</text>
  <text x="525" y="272" class="sub">SwiGLU &#x628A; (gate_i, up_i) &#x7F29;&#x4E3A;&#x534A;&#x5BBD;</text>
  <text x="525" y="290" class="sub">&#x2234; &#x4E24;&#x5757;&#x51D1;&#x9F50;&#x624D;&#x80FD;&#x51FA;&#x4E00;&#x4E2A; H &#x5757;</text>
  <text x="525" y="316" class="sub">&#x5B9E;&#x73B0;&#xFF1A;</text>
  <text x="535" y="336" font-family="monospace" font-size="10">red_or_rel_gpu(mask, 1ull &lt;&lt; n);</text>
  <text x="525" y="358" class="sub">L2 &#x8F6E;&#x8BE2;&#xFF1A;</text>
  <text x="535" y="374" font-family="monospace" font-size="10">(mask &amp; (3&lt;&lt;k*2)) == (3&lt;&lt;k*2)</text>

  <!-- Arrow from left to right panel -->
  <path d="M445 179 C 475 175 490 110 510 110" class="arr" marker-end="url(#ar3)"/>
  <text x="460" y="165" class="sub">&#x5C3E;&#x58F0;&#x5199; mask</text>
</svg>
