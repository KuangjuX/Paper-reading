<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 500" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
  <style>
    .title{font-size:15px;font-weight:600;}
    .lab{font-size:11px;}
    .sub{font-size:10px;fill:#666;}
    .box{stroke:#444;stroke-width:1.2;}
    .disp{fill:#dde7ff;}
    .l1{fill:#fde8c8;}
    .swi{fill:#fff2a8;}
    .l2{fill:#d9efd0;}
    .comb{fill:#f4cccc;}
    .axis{stroke:#aaa;stroke-width:1;}
    .barrier{stroke:#c00;stroke-dasharray:4 3;stroke-width:1.4;}
    .baracross{stroke:#0070b8;stroke-dasharray:4 3;stroke-width:1.4;}
  </style>

  <text x="20" y="26" class="title">&#x56FE; 1  MegaMoE &#x5355;&#x4E2A;&#x6CE2;&#x6B21;&#x5185;&#x7684;&#x6838;&#x5185;&#x65F6;&#x95F4;&#x7EBF;</text>
  <text x="20" y="44" class="sub">&#x7EA2;&#x865A;&#x7EBF; = &#x7F51;&#x683C;&#x5C4F;&#x969C;&#xFF1B;&#x84DD;&#x865A;&#x7EBF; = NVLink &#x5C4F;&#x969C;&#xFF1B;&#x7BAD;&#x5934; = &#x6570;&#x636E;&#x4F9D;&#x8D56;</text>

  <!-- Time axis -->
  <line x1="155" y1="460" x2="1020" y2="460" class="axis"/>
  <text x="155" y="478" class="sub">t=0</text>
  <text x="1015" y="478" class="sub" text-anchor="end">&#x6838;&#x7ED3;&#x675F;</text>

  <!-- Lane labels (wider left margin) -->
  <text x="10" y="100" class="lab" font-weight="600">&#x5206;&#x53D1;</text>
  <text x="10" y="180" class="lab" font-weight="600">TMA &#x52A0;&#x8F7D;</text>
  <text x="10" y="260" class="lab" font-weight="600">UMMA</text>
  <text x="10" y="340" class="lab" font-weight="600">&#x5C3E;&#x58F0;</text>
  <text x="10" y="410" class="lab" font-weight="600">&#x5408;&#x5E76;</text>

  <!-- Dispatch lane -->
  <rect class="box disp" x="155" y="80" width="140" height="36"/>
  <text x="225" y="103" text-anchor="middle" font-size="11">&#x7EDF;&#x8BA1; + &#x5199;&#x7D22;&#x5F15;</text>
  <rect class="box disp" x="305" y="80" width="190" height="36"/>
  <text x="400" y="103" text-anchor="middle" font-size="11">&#x62C9;&#x53D6;&#x8BCD;&#x5143;&#x5230;&#x672C;&#x5730;&#x6C60;</text>
  <rect class="box disp" x="505" y="80" width="180" height="36"/>
  <text x="595" y="103" text-anchor="middle" font-size="11">&#x7EE7;&#x7EED;&#x62C9;&#x53D6;&#xFF08;&#x4E0E; L1 &#x5E76;&#x884C;&#xFF09;</text>
  <rect class="box disp" x="880" y="80" width="130" height="36"/>
  <text x="945" y="103" text-anchor="middle" font-size="11">&#x6E05;&#x7406; workspace</text>

  <!-- TMA load lane -->
  <rect class="box l1" x="340" y="160" width="170" height="36"/>
  <text x="425" y="183" text-anchor="middle" font-size="11">L1: &#x52A0;&#x8F7D; X / W&#x2081;</text>
  <rect class="box l2" x="530" y="160" width="170" height="36"/>
  <text x="615" y="183" text-anchor="middle" font-size="11">L2: &#x52A0;&#x8F7D; H / W&#x2082;</text>
  <rect class="box l1" x="720" y="160" width="100" height="36"/>
  <text x="770" y="183" text-anchor="middle" font-size="11">L1 &#x6CE2; 2</text>
  <rect class="box l2" x="830" y="160" width="100" height="36"/>
  <text x="880" y="183" text-anchor="middle" font-size="11">L2 &#x6CE2; 2</text>

  <!-- UMMA lane -->
  <rect class="box l1" x="360" y="240" width="150" height="36"/>
  <text x="435" y="263" text-anchor="middle" font-size="11">L1 UMMA</text>
  <rect class="box l2" x="550" y="240" width="150" height="36"/>
  <text x="625" y="263" text-anchor="middle" font-size="11">L2 UMMA</text>
  <rect class="box l1" x="730" y="240" width="90" height="36"/>
  <text x="775" y="263" text-anchor="middle" font-size="11">L1</text>
  <rect class="box l2" x="840" y="240" width="90" height="36"/>
  <text x="885" y="263" text-anchor="middle" font-size="11">L2</text>

  <!-- Epilogue lane -->
  <rect class="box swi" x="400" y="320" width="150" height="36"/>
  <text x="475" y="343" text-anchor="middle" font-size="11">SwiGLU + &#x91CF;&#x5316;</text>
  <rect class="box comb" x="570" y="320" width="140" height="36"/>
  <text x="640" y="343" text-anchor="middle" font-size="11">L2 &#x8FDC;&#x7AEF;&#x5199;&#x56DE;</text>
  <rect class="box swi" x="740" y="320" width="90" height="36"/>
  <text x="785" y="343" text-anchor="middle" font-size="11">SwiGLU</text>
  <rect class="box comb" x="850" y="320" width="90" height="36"/>
  <text x="895" y="343" text-anchor="middle" font-size="11">&#x5199;&#x56DE;</text>

  <!-- Combine lane -->
  <rect class="box comb" x="720" y="390" width="290" height="36"/>
  <text x="865" y="413" text-anchor="middle" font-size="11">&#x5408;&#x5E76; top-k &#x69FD;&#x4F4D; &#x2192; BF16 &#x8F93;&#x51FA;</text>

  <!-- Barriers -->
  <line x1="330" y1="68" x2="330" y2="435" class="baracross"/>
  <text x="330" y="62" text-anchor="middle" fill="#0070b8" font-size="10">NVLink &#x5C4F;&#x969C;</text>
  <line x1="715" y1="68" x2="715" y2="435" class="barrier"/>
  <text x="715" y="62" text-anchor="middle" fill="#c00" font-size="10">grid_sync</text>

  <!-- Dependency arrows -->
  <path d="M510 258 L540 258" stroke="#444" marker-end="url(#arr)" fill="none"/>
  <path d="M510 258 L530 334" stroke="#aa6600" marker-end="url(#arr)" fill="none"/>
  <text x="470" y="298" class="sub" fill="#aa6600">L1&#x2192;L2 &#x4F9D;&#x8D56;</text>
  <path d="M710 340 L720 400" stroke="#888" marker-end="url(#arr)" fill="none"/>
</svg>
