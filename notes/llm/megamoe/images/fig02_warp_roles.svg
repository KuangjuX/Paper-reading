    <text x="130" y="335" text-anchor="middle">W8..W11&#xFF08;WG0&#xFF09;</text>
    <text x="130" y="353" text-anchor="middle" class="sub">L1 SwiGLU+&#x91CF;&#x5316; / L2 &#x8FDC;&#x7AEF;&#x5199;&#x56DE; / &#x5408;&#x5E76;&#x5F52;&#x7EA6;</text>

    <rect class="box epi" x="225" y="310" width="180" height="60"/>
    <text x="315" y="335" text-anchor="middle">W12..W15&#xFF08;WG1&#xFF09;</text>
    <text x="315" y="353" text-anchor="middle" class="sub">&#x540C;&#x4E0A;&#xFF1A;&#x6BCF;&#x4E2A; WG &#x5404;&#x8D1F;&#x8D23; BLOCK_M/2 &#x884C;</text>
  </g>

  <!-- Side panel: shared resources -->
  <g>
    <rect class="box reg" x="500" y="100" width="380" height="270"/>
    <text x="690" y="125" text-anchor="middle" class="grp">2-CTA cluster &#x5171;&#x4EAB;&#x8D44;&#x6E90;</text>

    <rect class="box disp" x="520" y="140" width="340" height="40"/>
    <text x="690" y="165" text-anchor="middle">&#x5BF9;&#x79F0;&#x663E;&#x5B58;&#x6620;&#x5C04; SymBuffer&#xFF08;&#x8DE8;&#x8FDB;&#x7A0B;&#x5171;&#x4EAB;&#x6307;&#x9488;&#xFF09;</text>

    <rect class="box ld" x="520" y="190" width="340" height="40"/>
    <text x="690" y="215" text-anchor="middle">&#x5171;&#x4EAB;&#x5185;&#x5B58;&#xFF1A;dispatch + CD + (A/B/SFA/SFB &#x00D7; Stages)</text>

    <rect class="box mma" x="520" y="240" width="340" height="40"/>
    <text x="690" y="265" text-anchor="middle">&#x5F20;&#x91CF;&#x5185;&#x5B58;&#xFF08;TMEM&#xFF09;&#xFF1A;&#x7D2F;&#x52A0;&#x5668; &#x00D7; 2 stage + SFA + SFB</text>

    <rect class="box epi" x="520" y="290" width="340" height="65"/>
    <text x="690" y="312" text-anchor="middle">&#x5C4F;&#x969C;&#x6570;&#x7EC4; barrier_start_ptr</text>
    <text x="690" y="330" text-anchor="middle" class="sub">dispatch + full/empty + tmem_full/empty + combine</text>
    <text x="690" y="346" text-anchor="middle" class="sub">grid_sync &#x8BA1;&#x6570;&#x5668; + NVLink &#x5C4F;&#x969C; phase &#x4FE1;&#x53F7;</text>
  </g>
