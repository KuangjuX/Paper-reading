<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <style>
    .title{font-size:15px;font-weight:600;}
    .sub{font-size:10px;fill:#666;}
    .box{stroke:#444;stroke-width:1.2;}
    .grp{font-size:12px;font-weight:600;}
    .disp{fill:#dde7ff;}
    .ld{fill:#e7d8f0;}
    .mma{fill:#ffe2c8;}
    .epi{fill:#d9efd0;}
    .reg{fill:#f4f4f4;}
  </style>

  <text x="20" y="26" class="title">&#x56FE; 2  &#x6BCF;&#x4E2A; SM &#x7684; 16 &#x4E2A;&#x7EBF;&#x7A0B;&#x675F;&#x89D2;&#x8272;&#x4E0E;&#x5BC4;&#x5B58;&#x5668;&#x914D;&#x989D;</text>
  <text x="20" y="44" class="sub">&#x603B;&#x7EBF;&#x7A0B; = 512&#xFF1B;CTA cluster = 2&#xFF0C;&#x4E24;&#x4E2A;&#x76F8;&#x90BB; SM &#x5171;&#x4EAB;&#x5F20;&#x91CF;&#x5185;&#x5B58;</text>

  <!-- Dispatch group: 4 warps -->
  <text x="30" y="80" class="grp">&#x5206;&#x53D1;&#xFF08;4 warp&#xFF0C;128 &#x7EBF;&#x7A0B;&#xFF0C;48 reg&#xFF09;</text>
  <rect class="box disp" x="30" y="90" width="240" height="55"/>
  <text x="150" y="112" text-anchor="middle" font-weight="600">W0 &#x2013; W3</text>
  <text x="150" y="130" text-anchor="middle" class="sub">&#x7EDF;&#x8BA1;&#x8DEF;&#x7531; / &#x5199;&#x7D22;&#x5F15; / &#x62C9;&#x8BCD;&#x5143; / &#x6E05;&#x7406;</text>

  <!-- Non-epilogue MMA: 4 warps -->
  <text x="30" y="175" class="grp">&#x77E9;&#x9635;&#x4E58;&#xFF08;4 warp&#xFF0C;128 &#x7EBF;&#x7A0B;&#xFF0C;40 reg&#xFF09;</text>
  <g>
    <rect class="box ld" x="30" y="185" width="80" height="55"/>
    <text x="70" y="207" text-anchor="middle" font-weight="600">W4</text>
    <text x="70" y="225" text-anchor="middle" class="sub">TMA A</text>

    <rect class="box ld" x="115" y="185" width="80" height="55"/>
    <text x="155" y="207" text-anchor="middle" font-weight="600">W5</text>
    <text x="155" y="225" text-anchor="middle" class="sub">TMA B</text>

    <rect class="box mma" x="200" y="185" width="80" height="55"/>
    <text x="240" y="207" text-anchor="middle" font-weight="600">W6</text>
    <text x="240" y="225" text-anchor="middle" class="sub">UMMA</text>

    <rect class="box reg" x="285" y="185" width="70" height="55"/>
    <text x="320" y="207" text-anchor="middle" font-weight="600">W7</text>
    <text x="320" y="225" text-anchor="middle" class="sub">&#x5907;&#x7528;</text>
  </g>

  <!-- Epilogue: 8 warps = 2 warpgroups -->
  <text x="30" y="275" class="grp">&#x5C3E;&#x58F0;/&#x5408;&#x5E76;&#xFF08;8 warp&#xFF0C;256 &#x7EBF;&#x7A0B;&#xFF0C;208 reg&#xFF09;</text>
  <g>
    <rect class="box epi" x="30" y="285" width="200" height="55"/>
    <text x="130" y="307" text-anchor="middle" font-weight="600">W8&#x2013;W11 (WG0)</text>
    <text x="130" y="325" text-anchor="middle" class="sub">SwiGLU / &#x5199;&#x56DE; / &#x5408;&#x5E76;</text>

    <rect class="box epi" x="235" y="285" width="200" height="55"/>
    <text x="335" y="307" text-anchor="middle" font-weight="600">W12&#x2013;W15 (WG1)</text>
    <text x="335" y="325" text-anchor="middle" class="sub">&#x540C;&#x4E0A;&#xFF0C;&#x5404;&#x8D1F;&#x8D23;&#x534A;&#x6570;&#x884C;</text>
  </g>

  <!-- Side panel: shared resources -->
  <rect class="box reg" x="510" y="80" width="420" height="310" rx="4"/>
  <text x="720" y="102" text-anchor="middle" class="grp">&#x53CC; CTA &#x7C07;&#x5171;&#x4EAB;&#x8D44;&#x6E90;</text>

  <rect class="box disp" x="530" y="115" width="380" height="40"/>
  <text x="720" y="140" text-anchor="middle" font-size="11">&#x5BF9;&#x79F0;&#x663E;&#x5B58; SymBuffer&#xFF08;&#x8DE8;&#x8FDB;&#x7A0B;&#x6307;&#x9488;&#x6620;&#x5C04;&#xFF09;</text>

  <rect class="box ld" x="530" y="165" width="380" height="40"/>
  <text x="720" y="183" text-anchor="middle" font-size="11">&#x5171;&#x4EAB;&#x5185;&#x5B58;&#xFF1A;&#x5206;&#x53D1;&#x533A; + &#x8F93;&#x51FA;&#x533A;</text>
  <text x="720" y="197" text-anchor="middle" class="sub">+ (A / B / SFA / SFB) &#x00D7; Stages</text>

  <rect class="box mma" x="530" y="215" width="380" height="45"/>
  <text x="720" y="233" text-anchor="middle" font-size="11">&#x5F20;&#x91CF;&#x5185;&#x5B58; (TMEM)</text>
  <text x="720" y="249" text-anchor="middle" class="sub">&#x7D2F;&#x52A0;&#x5668; &#x00D7; 2 stage + SFA &#x5217; + SFB &#x5217;</text>

  <rect class="box epi" x="530" y="270" width="380" height="60"/>
  <text x="720" y="290" text-anchor="middle" font-size="11">&#x5C4F;&#x969C;&#x6570;&#x7EC4;</text>
  <text x="720" y="306" text-anchor="middle" class="sub">full / empty / tmem_full / tmem_empty / combine</text>
  <text x="720" y="322" text-anchor="middle" class="sub">grid_sync &#x8BA1;&#x6570;&#x5668; + NVLink &#x4FE1;&#x53F7;</text>

  <rect class="box reg" x="530" y="340" width="380" height="35"/>
  <text x="720" y="363" text-anchor="middle" font-size="11">&#x8C03;&#x5EA6;&#x5668; MegaMoEScheduler&#xFF08;&#x6CE2;&#x6B21;&#x72B6;&#x6001;&#x673A;&#xFF09;</text>
</svg>
